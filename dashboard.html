<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Secure NGO System</span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">

    <h2 class="mb-4">Welcome</h2>

    <div class="row">

        <!-- Encrypt Card -->
        <div class="col-md-6 mb-4">
            <div class="card shadow p-4 text-center">
                <h4>Encrypt Message</h4>
                <p class="text-muted">Securely encrypt your sensitive data</p>
                <a href="/send" class="btn btn-success">Go</a>
            </div>
        </div>

        <!-- View Messages -->
        <div class="col-md-6 mb-4">
            <div class="card shadow p-4 text-center">
                <h4>View Messages</h4>
                <p class="text-muted">Access encrypted messages</p>
                <a href="/messages" class="btn btn-primary">Go</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
